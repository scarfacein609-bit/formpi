<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FORMPI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #020617;
    }

    nav h2 {
      margin: 0;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      margin-top: 100px;
    }

    .hero h1 {
      font-size: 50px;
    }

    .hero p {
      color: #94a3b8;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: #38bdf8;
      color: black;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .section {
      margin-top: 100px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      background: #020617;
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<nav>
  <h2>🔥 MyBrand</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Build Your Future 🚀</h1>
  <p>Turning nothing into something.</p>
  <button onclick="startNow()">Get Started</button>
</div>

<div class="section">
  <h2>What I Do</h2>
  <div class="cards">
    <div class="card">
      <h3>💻 Coding</h3>
      <p>I build apps and websites</p>
    </div>
    <div class="card">
      <h3>💪 Fitness</h3>
      <p>Working on body & discipline</p>
    </div>
    <div class="card">
      <h3>💰 Goals</h3>
      <p>Future billionaire mindset</p>
    </div>
  </div>
</div>

<footer>
  © 2026 MyBrand | Built by Me 😎
</footer>

<script>
function startNow() {
  alert("You're starting your journey 🔥");
}
</script>

</body>
</html>
